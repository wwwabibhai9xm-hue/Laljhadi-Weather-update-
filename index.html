<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherPro V2</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- APP HEADER -->

<header class="app-header">

<div class="app-title">
<i class="fas fa-cloud-sun"></i>
WeatherPro
</div>

<button class="menu-btn">
<i class="fas fa-bars"></i>
</button>

</header>

<!-- SEARCH -->

<section class="search-section">

<input
type="text"
id="cityInput"
placeholder="Search city...">

<button id="searchBtn">
<i class="fas fa-search"></i>
</button>

</section>

<!-- MAIN WEATHER CARD -->

<section class="hero-card">

<div class="city-row">

<h2 id="cityName">
Kathmandu
</h2>

<div id="weatherIcon" class="hero-icon">
☀️
</div>

</div>

<h1 id="temperature">
--°C
</h1>

<p id="description">
Loading weather...
</p>

</section>

<!-- TODAY DETAILS -->

<section class="details-grid">

<div class="detail-card">
<span>🌡️</span>
<h4>Feels Like</h4>
<p id="feelsLike">--°</p>
</div>

<div class="detail-card">
<span>💧</span>
<h4>Humidity</h4>
<p id="humidity">--%</p>
</div>

<div class="detail-card">
<span>💨</span>
<h4>Wind</h4>
<p id="wind">-- km/h</p>
</div>

<div class="detail-card">
<span>🌧️</span>
<h4>Rain</h4>
<p id="rain">--%</p>
</div>

</section>

<!-- HOURLY -->

<section class="section">

<div class="section-title">
Hourly Forecast
</div>

<div id="hourlyForecast"
class="hourly-scroll">
</div>

</section>

<!-- DAILY -->

<section class="section">

<div class="section-title">
7 Day Forecast
</div>

<div id="dailyForecast">
</div>

</section>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<button class="nav-item active">
<i class="fas fa-sun"></i>
<span>Today</span>
</button>

<button class="nav-item">
<i class="fas fa-clock"></i>
<span>Hourly</span>
</button>

<button class="nav-item">
<i class="fas fa-calendar"></i>
<span>Daily</span>
</button>

<button class="nav-item">
<i class="fas fa-satellite"></i>
<span>Radar</span>
</button>

<button class="nav-item">
<i class="fas fa-chart-line"></i>
<span>Climate</span>
</button>

</nav>

<script src="script.js"></script>

</body>
</html>
